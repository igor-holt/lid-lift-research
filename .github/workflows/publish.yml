name: Publish to Zenodo
on:
  push:
    branches:
      - main
    paths:
      - '*.md'           # Trigger only when papers change
      - '*.zip'          # Add zip artifacts
      - 'zenodo_publisher.py'
  workflow_dispatch:     # Manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Verify Archive Integrity
        run: |
          if [ -f "mcp-tool-dissonance-v1.0.0-podman.zip" ]; then
            echo "Archive found, verifying..."
            unzip -l mcp-tool-dissonance-v1.0.0-podman.zip
            FILE_COUNT=$(unzip -l mcp-tool-dissonance-v1.0.0-podman.zip | grep -c "mcp-tool-dissonance")
            echo "File count: $FILE_COUNT"
          fi

      - name: Run Publisher Script
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          python zenodo_publisher.py